<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }

    main {
      width: min(90%, 520px);
      text-align: center;
      padding: 2rem;
      border-radius: 14px;
      background: #1e293b;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 700;
      background: #334155;
      border: 2px dashed #94a3b8;
    }

    h1 {
      margin: 0.2rem 0 0.8rem;
      font-size: 1.8rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-label="Placeholder logo">L</div>
    <h1>About Me</h1>
    <p>
      Hi! I’m a developer who enjoys building clean, simple web experiences.
      This is a placeholder page where I can add more details about myself soon.
    </p>
  </main>
</body>
</html>
